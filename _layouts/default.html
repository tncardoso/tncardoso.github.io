<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en-us">

  {% include head.html %}

  <body>

    <div class="container content">
      <div class="masthead">
        <h3 class="masthead-title">
          <a href="{{ site.baseurl }}" title="Home">{{ site.title }}</a>
        </h3>
        <div class="tagline">{{ site.tagline }}</div>
        <a href="http://www.github.com/{{ site.author.github }}" target="_blank"><span class="icon icon-github"></span></a>
        <a href="http://www.twitter.com/{{ site.author.twitter }}" target="_blank"><span class="icon icon-twitter"></span></a>
        <!--<span class="icon icon-linkedin"></span>-->
        <a href="{{ "atom.xml" | prepend: site.baseurl  }}"><span class="icon icon-rss"></span></a>
         
    </div>

      {{ content }}

      <div class="footer">
      <p class="copyright">
         &copy; {{ site.time | date: '%Y' }} Thiago Cardoso.
        </p>
      </div>
    </div>

    <script>
      (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
      (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
      m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
      })(window,document,'script','//www.google-analytics.com/analytics.js','ga');

      ga('create', 'UA-25953089-1', 'auto');
      ga('send', 'pageview');
    </script>

  </body>
</html>
